<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claude Code Daily — {{DATE}}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0d1117;
      --surface:     #161b22;
      --border:      #30363d;
      --border-mute: #21262d;
      --accent:      #388bfd;
      --accent-glow: rgba(56,139,253,.15);
      --top:         #f78166;
      --top-glow:    rgba(247,129,102,.12);
      --text:        #e6edf3;
      --text-muted:  #8b949e;
      --text-faint:  #484f58;

      --tag-claude:   #7ee787;
      --tag-web:      #ff7b72;
      --tag-seo:      #79c0ff;
      --tag-appdev:   #ffa657;
      --tag-tools:    #d2a8ff;
      --tag-tuts:     #f0883e;

      --radius:   10px;
      --radius-sm: 6px;
    }

    html { font-size: 16px; scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── Layout ── */
    .page-wrap {
      max-width: 820px;
      margin: 0 auto;
      padding: 0 16px 80px;
    }

    /* ── Header ── */
    header {
      padding: 36px 0 28px;
      border-bottom: 1px solid var(--border-mute);
      margin-bottom: 28px;
    }

    .header-inner {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .logo-block {}

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 4px;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #388bfd 0%, #7ee787 100%);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 16px;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .subtitle {
      font-size: 0.825rem;
      color: var(--text-muted);
    }

    .count-badge {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 0.78rem;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .count-badge strong {
      color: var(--accent);
      font-weight: 600;
    }

    /* ── Filter bars ── */
    .filter-section {
      margin-bottom: 10px;
    }

    .filter-label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--text-faint);
      margin-bottom: 8px;
      font-weight: 600;
    }

    .pills {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .pill {
      padding: 5px 13px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-muted);
      transition: background .15s, color .15s, border-color .15s, box-shadow .15s;
      user-select: none;
      line-height: 1.4;
    }

    .pill:hover {
      border-color: var(--accent);
      color: var(--text);
    }

    .pill.active {
      background: var(--accent-glow);
      border-color: var(--accent);
      color: var(--accent);
      box-shadow: 0 0 0 1px var(--accent);
    }

    .filter-divider {
      height: 1px;
      background: var(--border-mute);
      margin: 16px 0 20px;
    }

    /* ── Feed ── */
    #feed {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
      transition: border-color .15s, box-shadow .15s;
      position: relative;
      overflow: hidden;
    }

    .card:hover {
      border-color: #484f58;
      box-shadow: 0 4px 24px rgba(0,0,0,.4);
    }

    .card.is-top {
      border-left: 3px solid var(--top);
      padding-left: 17px;
      background: linear-gradient(135deg, var(--top-glow) 0%, var(--surface) 60%);
    }

    .card.hidden { display: none; }

    /* Card header row */
    .card-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }

    .card-meta-left {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .source-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-muted);
      background: var(--bg);
      border: 1px solid var(--border-mute);
      border-radius: 5px;
      padding: 2px 8px;
    }

    .source-icon { font-size: 11px; }

    .source-detail {
      font-size: 0.73rem;
      color: var(--text-faint);
    }

    .time-ago {
      font-size: 0.73rem;
      color: var(--text-faint);
      white-space: nowrap;
    }

    .top-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: .04em;
      color: var(--top);
      background: rgba(247,129,102,.12);
      border: 1px solid rgba(247,129,102,.3);
      border-radius: 4px;
      padding: 2px 7px;
    }

    /* Card title */
    .card-title {
      font-size: 1rem;
      font-weight: 600;
      line-height: 1.4;
      margin-bottom: 7px;
    }

    .card-title a {
      color: var(--text);
      text-decoration: none;
      transition: color .12s;
    }

    .card-title a:hover { color: var(--accent); }

    /* Card summary */
    .card-summary {
      font-size: 0.855rem;
      color: var(--text-muted);
      line-height: 1.55;
      margin-bottom: 12px;
    }

    /* Topic tags */
    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    .tag {
      font-size: 0.72rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 4px;
      letter-spacing: .02em;
    }

    .tag-claude-code  { background: rgba(126,231,135,.12); color: var(--tag-claude); border: 1px solid rgba(126,231,135,.25); }
    .tag-web-design   { background: rgba(255,123,114,.12); color: var(--tag-web);    border: 1px solid rgba(255,123,114,.25); }
    .tag-seo          { background: rgba(121,192,255,.12); color: var(--tag-seo);    border: 1px solid rgba(121,192,255,.25); }
    .tag-app-dev      { background: rgba(255,166,87,.12);  color: var(--tag-appdev); border: 1px solid rgba(255,166,87,.25);  }
    .tag-new-tools    { background: rgba(210,168,255,.12); color: var(--tag-tools);  border: 1px solid rgba(210,168,255,.25); }
    .tag-tutorials    { background: rgba(240,136,62,.12);  color: var(--tag-tuts);   border: 1px solid rgba(240,136,62,.25);  }

    /* Relevance bar */
    .relevance-bar {
      position: absolute;
      top: 0;
      right: 0;
      width: 3px;
      background: var(--border-mute);
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }

    .relevance-fill {
      background: linear-gradient(to top, var(--accent), transparent);
      border-radius: 0 var(--radius) var(--radius) 0;
      transition: height .3s;
    }

    /* ── Empty state ── */
    #empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
      display: none;
    }

    #empty .empty-icon { font-size: 2.5rem; margin-bottom: 12px; }
    #empty p { font-size: 0.9rem; }

    /* ── Footer ── */
    footer {
      margin-top: 48px;
      padding-top: 20px;
      border-top: 1px solid var(--border-mute);
      text-align: center;
      font-size: 0.78rem;
      color: var(--text-faint);
    }

    footer a { color: var(--text-muted); text-decoration: none; }
    footer a:hover { color: var(--text); }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      h1 { font-size: 1.25rem; }
      .card { padding: 14px 16px; }
      .card.is-top { padding-left: 13px; }
      .card-title { font-size: 0.93rem; }
    }

    /* ── Scroll to top ── */
    #scroll-top {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s, transform .2s;
      z-index: 100;
    }

    #scroll-top.visible {
      opacity: 1;
      pointer-events: all;
    }

    #scroll-top:hover {
      background: var(--accent-glow);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── Stats row ── */
    .stats-row {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .stat {
      font-size: 0.78rem;
      color: var(--text-faint);
    }

    .stat strong {
      color: var(--text-muted);
      font-weight: 600;
    }
  </style>
</head>
<body>

<div class="page-wrap">
  <header>
    <div class="header-inner">
      <div class="logo-block">
        <div class="logo">
          <div class="logo-icon">⚡</div>
          <h1>Claude Code Daily</h1>
        </div>
        <p class="subtitle">{{DATE}}</p>
      </div>
      <div class="count-badge">
        <strong>{{COUNT}}</strong> curated items
      </div>
    </div>
  </header>

  <!-- Topic filters -->
  <div class="filter-section">
    <div class="filter-label">Topics</div>
    <div class="pills" id="topic-filters">
      <button class="pill active" data-topic="all">All Topics</button>
      <button class="pill" data-topic="claude-code">Claude Code</button>
      <button class="pill" data-topic="web-design">Web Design</button>
      <button class="pill" data-topic="seo">SEO / GEO</button>
      <button class="pill" data-topic="app-dev">App Dev</button>
      <button class="pill" data-topic="new-tools">New Tools</button>
      <button class="pill" data-topic="tutorials">Tutorials</button>
    </div>
  </div>

  <div class="filter-section" style="margin-top:12px;">
    <div class="filter-label">Sources</div>
    <div class="pills" id="source-filters">
      <button class="pill active" data-source="all">All Sources</button>
      <button class="pill" data-source="github">GitHub</button>
      <button class="pill" data-source="youtube">YouTube</button>
      <button class="pill" data-source="twitter">X / Twitter</button>
      <button class="pill" data-source="reddit">Reddit</button>
      <button class="pill" data-source="blogs">Blogs</button>
      <button class="pill" data-source="producthunt">Product Hunt</button>
    </div>
  </div>

  <div class="filter-divider"></div>

  <div class="stats-row" id="stats-row"></div>

  <div id="feed"></div>
  <div id="empty">
    <div class="empty-icon">🔍</div>
    <p>No items match the current filters.<br>Try selecting a different topic or source.</p>
  </div>
</div>

<div id="scroll-top" title="Back to top">↑</div>

<div class="page-wrap">
  <footer>
    Built with <a href="https://claude.ai" target="_blank" rel="noopener">Claude</a> ·
    Auto-refreshes daily via GitHub Actions ·
    <a href="https://github.com" target="_blank" rel="noopener">View source</a>
  </footer>
</div>

<script>
  // ── Data ──
  const ITEMS = {{DATA}};

  // ── Topic config ──
  const TOPIC_META = {
    'claude-code': { label: 'Claude Code', cls: 'tag-claude-code' },
    'web-design':  { label: 'Web Design',  cls: 'tag-web-design'  },
    'seo':         { label: 'SEO/GEO',     cls: 'tag-seo'         },
    'app-dev':     { label: 'App Dev',     cls: 'tag-app-dev'     },
    'new-tools':   { label: 'New Tools',   cls: 'tag-new-tools'   },
    'tutorials':   { label: 'Tutorials',   cls: 'tag-tutorials'   },
  };

  // ── Source config ──
  const SOURCE_META = {
    github:      { icon: '⭐', label: 'GitHub'       },
    youtube:     { icon: '▶',  label: 'YouTube'      },
    twitter:     { icon: '𝕏',  label: 'X / Twitter'  },
    reddit:      { icon: '▲',  label: 'Reddit'       },
    blogs:       { icon: '📰', label: 'Blog'         },
    producthunt: { icon: '🔥', label: 'Product Hunt' },
  };

  // ── Helpers ──
  function timeAgo(ts) {
    if (!ts) return '';
    const diff = Date.now() - new Date(ts).getTime();
    const m = Math.floor(diff / 60000);
    if (m < 2)  return 'just now';
    if (m < 60) return `${m}m ago`;
    const h = Math.floor(m / 60);
    if (h < 24) return `${h}h ago`;
    const d = Math.floor(h / 24);
    return `${d}d ago`;
  }

  function sourceDetail(item) {
    const src = (item.source || '').toLowerCase();
    if (src === 'github' && item.stars != null) return `★ ${item.stars.toLocaleString()}`;
    if (src === 'youtube' && item.channel)      return item.channel;
    if (src === 'reddit'  && item.subreddit)    return `r/${item.subreddit}${item.score != null ? ' · ' + item.score + ' pts' : ''}`;
    if (src === 'twitter' && item.author)       return `@${item.author}`;
    if (src === 'blogs'   && item.feed)         return item.feed;
    return '';
  }

  function normSource(item) {
    return (item.source || '').toLowerCase();
  }

  function escHtml(s) {
    if (!s) return '';
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Render ──
  function renderCard(item) {
    const src = normSource(item);
    const sm = SOURCE_META[src] || { icon: '•', label: item.source || 'Source' };
    const detail = sourceDetail(item);
    const ago = timeAgo(item.timestamp);
    const topics = Array.isArray(item.topics) ? item.topics : [];
    const isTop = !!item.is_top;
    const score = Math.min(100, Math.max(0, item.relevance_score || 50));

    const topicTags = topics.map(t => {
      const tm = TOPIC_META[t];
      if (!tm) return '';
      return `<span class="tag ${tm.cls}">${escHtml(tm.label)}</span>`;
    }).join('');

    const tagRow = topicTags
      ? `<div class="card-tags">${topicTags}</div>`
      : '';

    const topBadge = isTop
      ? `<span class="top-badge">▲ TOP</span>`
      : '';

    const card = document.createElement('article');
    card.className = 'card' + (isTop ? ' is-top' : '');
    card.dataset.source = src;
    card.dataset.topics = topics.join(',');

    card.innerHTML = `
      <div class="relevance-bar"><div class="relevance-fill" style="height:${score}%"></div></div>
      <div class="card-meta">
        <div class="card-meta-left">
          <span class="source-badge">
            <span class="source-icon">${sm.icon}</span>
            ${escHtml(sm.label)}
          </span>
          ${detail ? `<span class="source-detail">${escHtml(detail)}</span>` : ''}
          ${ago ? `<span class="time-ago">${ago}</span>` : ''}
        </div>
        ${topBadge}
      </div>
      <h2 class="card-title">
        <a href="${escHtml(item.url)}" target="_blank" rel="noopener noreferrer">${escHtml(item.title)}</a>
      </h2>
      <p class="card-summary">${escHtml(item.summary || item.description || '')}</p>
      ${tagRow}
    `;

    return card;
  }

  // ── Filter state ──
  let activeTopic  = 'all';
  let activeSource = 'all';

  function applyFilters() {
    const cards = document.querySelectorAll('#feed .card');
    let visible = 0;

    cards.forEach(card => {
      const srcMatch  = activeSource === 'all' || card.dataset.source === activeSource;
      const topicList = card.dataset.topics ? card.dataset.topics.split(',') : [];
      const topicMatch = activeTopic === 'all' || topicList.includes(activeTopic);

      if (srcMatch && topicMatch) {
        card.classList.remove('hidden');
        visible++;
      } else {
        card.classList.add('hidden');
      }
    });

    document.getElementById('empty').style.display = visible === 0 ? 'block' : 'none';
    updateStats(visible);
  }

  function updateStats(visible) {
    const total = ITEMS.length;
    const tops  = ITEMS.filter(i => i.is_top).length;
    const statsRow = document.getElementById('stats-row');
    statsRow.innerHTML = `
      <span class="stat">Showing <strong>${visible}</strong> of ${total}</span>
      <span class="stat"><strong>${tops}</strong> top stories</span>
    `;
  }

  function setTopicFilter(topic) {
    activeTopic = topic;
    document.querySelectorAll('#topic-filters .pill').forEach(p => {
      p.classList.toggle('active', p.dataset.topic === topic);
    });
    applyFilters();
  }

  function setSourceFilter(source) {
    activeSource = source;
    document.querySelectorAll('#source-filters .pill').forEach(p => {
      p.classList.toggle('active', p.dataset.source === source);
    });
    applyFilters();
  }

  // ── Init ──
  (function init() {
    const feed = document.getElementById('feed');

    if (!ITEMS || ITEMS.length === 0) {
      document.getElementById('empty').style.display = 'block';
      return;
    }

    const frag = document.createDocumentFragment();
    ITEMS.forEach(item => frag.appendChild(renderCard(item)));
    feed.appendChild(frag);

    updateStats(ITEMS.length);

    // Topic pills
    document.getElementById('topic-filters').addEventListener('click', e => {
      const pill = e.target.closest('.pill');
      if (!pill) return;
      setTopicFilter(pill.dataset.topic);
    });

    // Source pills
    document.getElementById('source-filters').addEventListener('click', e => {
      const pill = e.target.closest('.pill');
      if (!pill) return;
      setSourceFilter(pill.dataset.source);
    });

    // Scroll-to-top
    const scrollBtn = document.getElementById('scroll-top');
    window.addEventListener('scroll', () => {
      scrollBtn.classList.toggle('visible', window.scrollY > 400);
    }, { passive: true });
    scrollBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
  })();
</script>
</body>
</html>
