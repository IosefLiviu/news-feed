name: Daily News Feed

on:
  schedule:
    # 04:15 UTC = 07:15 EEST (summer) / 06:15 EET (winter). Run takes ~10 min,
    # so the feed is published by ~07:30 local in summer — well before 8 AM.
    # Off-hour minute (:15) avoids GitHub's round-hour scheduler contention.
    - cron: '15 4 * * *'
  workflow_dispatch: {}   # Manual trigger for testing

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci

      - run: node run.js
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git diff --staged --quiet || git commit -m "chore: daily feed $(date +%Y-%m-%d)"
          git push
